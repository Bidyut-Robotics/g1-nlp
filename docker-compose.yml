name: humanoid-nlp

services:

  # ─── Main NLP Pipeline ────────────────────────────────────────────────────────
  nlp:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    image: humanoid-nlp:latest
    container_name: humanoid_nlp

    # ── NVIDIA GPU Access (Required for Jetson/G1) ──────────────────────────────
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # ── Audio: share host PulseAudio socket ───────────────────────────────────
    # The host's PulseAudio server socket is mounted so the container can
    # play and record audio via the host's sound system (laptop speakers/mic)
    # or through the G1 PulseAudio virtual devices (g1_microphone / g1_speaker).
    volumes:
      - /tmp/pulse:/tmp/pulse                # PulseAudio socket
      - /run/user/1000/pulse:/run/user/1000/pulse  # systemd user socket (fallback)
      - ~/.config/pulse/cookie:/root/.config/pulse/cookie:ro # Authentication cookie
      - ./config:/app/config                 # live config reloading
      - ./models:/app/models                 # ONNX/Piper models
      - ./data:/app/data                     # ChromaDB persistent store
      - ./logs:/app/logs                     # Runtime logs

    devices:
      - /dev/snd:/dev/snd                    # Expose sound devices natively

    environment:
      # Hardware mode: "laptop" or "g1"
      HARDWARE_MODE: ${HARDWARE_MODE:-laptop}
      # LLM provider: "local" (Ollama sidecar) or "groq"
      LLM_MODE: ${LLM_MODE:-local}
      # Ollama URL points to the local host (since we use host networking)
      OLLAMA_BASE_URL: http://localhost:11434
      # Groq API key (loaded from .env, never hardcoded)
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      # ASR: use GPU inside container
      ASR_DEVICE: ${ASR_DEVICE:-cuda}
      ASR_COMPUTE_TYPE: ${ASR_COMPUTE_TYPE:-float16}
      # PulseAudio server address (host socket - standard Ubuntu location)
      PULSE_SERVER: unix:/run/user/1000/pulse/native
      PULSE_SOURCE: g1_microphone
      PULSE_SINK: g1_speaker
      NVIDIA_DISABLE_REQUIRE: "true"
      NLP_DEBUG: ${NLP_DEBUG:-1}

    # Share host network namespace for DDS/multicast (required for G1 mode)
    network_mode: host

    # GPU IPC for shared CUDA memory (faster inter-process transfers)
    ipc: host

    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy

  # ─── Ollama (Local LLM Sidecar) ───────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: humanoid_ollama
    runtime: nvidia

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    volumes:
      - ollama_data:/root/.ollama           # Persist downloaded models

    environment:
      OLLAMA_HOST: 0.0.0.0
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility

    # Share host network (avoids bridge issues and ensures localhost access)
    network_mode: host

    # Health check: use the binary itself to check status
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

    restart: unless-stopped

volumes:
  ollama_data:
